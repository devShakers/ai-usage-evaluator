<!doctype html>
<html lang="__LANG__" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shakers · AI usage report (mockup v2 — grafo protagonista)</title>
<style>
/* ============================================================================
   Shakers AI usage — LOCAL report (graph). Self-contained, ZERO network at view time.
   Layout: dagre (@dagrejs/dagre) embebido INLINE — layered LR, sin solape y con
   reducción de cruces POR CONSTRUCCIÓN. Tokens teal/lime/zinc de report-theme.js.
   NO es el report real; datos de grafo reales (.foglamp/scan.json), footprint/
   certs mock.
   ========================================================================== */
:root{
  --ds-teal-50:#e2f2f0; --ds-teal-100:#c5e5e1; --ds-teal-300:#51b1a5;
  --ds-teal-400:#269787; --ds-teal-500:#0e7d69; --ds-teal-600:#0b5a4c;
  --ds-teal-700:#08473c; --ds-teal-800:#05342c; --ds-teal-900:#03211c;
  --ds-lime-200:#f5ff96; --ds-lime-500:#d8e637; --ds-lime-600:#b0bd2d;
  --ds-zinc-50:#fafafa; --ds-zinc-100:#f4f4f5; --ds-zinc-200:#e4e4e7;
  --ds-zinc-300:#d4d4d8; --ds-zinc-400:#a1a1aa; --ds-zinc-500:#71717a;
  --ds-zinc-600:#52525b; --ds-zinc-700:#3f3f46; --ds-zinc-800:#27272a;
  --ds-zinc-900:#18181b; --ds-zinc-950:#09090b; --ds-white:#ffffff;
  --ds-success:#059669; --ds-warning:#f59e0b; --ds-destructive:#e11d48;
  --r-sm:6px; --r-md:8px; --r-lg:10px; --r-xl:14px; --r-full:9999px;
  --font-sans:"Inter",ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
}
html[data-theme="light"]{
  --bg:var(--ds-white); --surface:var(--ds-white); --surface-2:var(--ds-zinc-50);
  --fg:var(--ds-zinc-900); --muted:var(--ds-zinc-700); --faint:var(--ds-zinc-600);
  --border:var(--ds-zinc-200); --border-strong:var(--ds-zinc-300);
  --primary:var(--ds-teal-800); --emphasis:var(--ds-teal-500);
  --secondary:var(--ds-teal-50); --secondary-fg:var(--ds-teal-600);
  --ring:var(--ds-teal-500); --canvas:#f7faf9; --grid:#e7efed;
  --edge:#b0bdc4; --node-bg:var(--ds-white); --node-shadow:0 1px 3px rgb(0 0 0/.10),0 4px 6px -1px rgb(0 0 0/.08);
}
html[data-theme="dark"]{
  --bg:#0b0e14; --surface:#131823; --surface-2:#0f141e;
  --fg:#e6ebf2; --muted:#a7b0bd; --faint:#7b8494;
  --border:#232b3a; --border-strong:#33405a;
  --primary:var(--ds-teal-300); --emphasis:var(--ds-teal-300);
  --secondary:#12241f; --secondary-fg:var(--ds-teal-300);
  --ring:var(--ds-teal-400); --canvas:#0b0e14; --grid:#141b28;
  --edge:#3a4759; --node-bg:#161c28; --node-shadow:0 2px 10px rgb(0 0 0/.5);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;overflow:hidden;transition:background .25s,color .25s}

/* header */
header{position:fixed;top:0;left:0;right:0;height:56px;z-index:40;
  display:flex;align-items:center;gap:16px;padding:0 18px;
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand .powered{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
.brand svg.wordmark{height:17px;width:auto;display:block}
html[data-theme="light"] .brand svg.wordmark path{fill:var(--ds-zinc-900)}
html[data-theme="dark"]  .brand svg.wordmark path{fill:#e6ebf2}
.proj{margin-left:6px;padding-left:16px;border-left:1px solid var(--border);min-width:0}
.proj .name{font-size:14px;font-weight:700;letter-spacing:-.01em;line-height:1.1;white-space:nowrap}
.proj .tag{font-size:11px;color:var(--faint);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw}
.spacer{flex:1}
.hbtn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;
  font-size:12.5px;font-weight:600;border-radius:var(--r-md);cursor:pointer;
  background:var(--surface-2);color:var(--muted);border:1px solid var(--border);white-space:nowrap}
.hbtn:hover{color:var(--fg);border-color:var(--border-strong)}
.hbtn.on{background:var(--secondary);color:var(--secondary-fg);border-color:transparent}
.hbtn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.8}

/* stats */
.stats{position:fixed;top:56px;left:0;right:0;height:44px;z-index:30;
  display:flex;align-items:center;gap:8px;padding:0 18px;overflow-x:auto;
  background:var(--surface);border-bottom:1px solid var(--border)}
/* LOUD degrade banner — theme-independent amber/red so a reduced fallback graph
   can never be mistaken for the full codebase analysis. Hidden on normal runs. */
.degrade-banner{position:fixed;top:100px;left:0;right:0;z-index:40;
  display:flex;align-items:center;gap:9px;padding:10px 18px;
  font-size:12.5px;font-weight:700;line-height:1.35;
  background:#7c2d12;color:#fff;border-bottom:2px solid #f59e0b;
  box-shadow:0 2px 10px rgba(0,0,0,.25)}
.degrade-banner::before{content:"⚠";font-size:15px;flex:none}
.degrade-banner[hidden]{display:none}
.stat{display:inline-flex;align-items:baseline;gap:6px;padding:4px 11px;border-radius:var(--r-full);
  background:var(--surface-2);border:1px solid var(--border);white-space:nowrap;flex:none}
.stat b{font-size:14px;font-weight:800;color:var(--fg);font-variant-numeric:tabular-nums}
.stat span{font-size:11px;color:var(--faint);letter-spacing:.02em}
.stat-sep{width:1px;height:20px;background:var(--border);flex:none;margin:0 2px}
.toplist{display:inline-flex;align-items:center;gap:5px;flex:none}
.toplist .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-right:2px}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  padding:2px 9px;border-radius:var(--r-full);background:var(--secondary);color:var(--secondary-fg);flex:none}
.pill .mono{width:15px;height:15px;border-radius:4px;display:grid;place-items:center;font-size:9px;font-weight:800;color:#fff}

/* stage */
#stage{position:fixed;inset:100px 0 0 0;background:var(--canvas);
  background-image:radial-gradient(var(--grid) 1px,transparent 1px);background-size:26px 26px;
  overflow:hidden;cursor:grab}
#stage.panning{cursor:grabbing}
#svg{width:100%;height:100%;display:block;touch-action:none}

.gp-band{fill:color-mix(in srgb,var(--emphasis) 7%,transparent);
  stroke:color-mix(in srgb,var(--emphasis) 26%,transparent);stroke-width:1.25;stroke-dasharray:5 4}
.gp-label{fill:var(--emphasis);font:800 10px/1 var(--font-sans);letter-spacing:.07em;text-transform:uppercase}

.edge{fill:none;stroke:var(--edge);stroke-width:1.6;opacity:.5;stroke-linejoin:round;stroke-linecap:round;
  transition:opacity .18s,stroke .18s,stroke-width .18s}
/* per-kind dash patterns double as the marching-ants track for the idle flow */
.edge.calls   {stroke:var(--ds-teal-400);stroke-dasharray:17 7}
.edge.triggers{stroke:var(--ds-lime-600);stroke-dasharray:7 6}
.edge.reads   {stroke:#8aa0b4;stroke-dasharray:2 6}
.edge.writes  {stroke:#8aa0b4;stroke-dasharray:17 7}
.edge.dim{opacity:.07}
.edge.hot{opacity:1;stroke-width:2.6}
.edge-arrow path{fill:var(--edge)}
.elabel{fill:var(--faint);font:600 9.5px/1 var(--font-mono);opacity:0;transition:opacity .15s;
  paint-order:stroke;stroke:var(--canvas);stroke-width:3px}
.elabel.show{opacity:1}

.node{cursor:pointer}
.node .box{fill:var(--node-bg);stroke:var(--border-strong);stroke-width:1.25;
  filter:drop-shadow(0 2px 4px rgb(0 0 0/.08));transition:stroke .15s}
.node .mono{font:800 12px/1 var(--font-sans);fill:#fff}
.node .lbl{font:700 12.5px/1 var(--font-sans);fill:var(--fg)}
.node .sub{font:500 9.5px/1 var(--font-mono);fill:var(--faint)}
.node .kindtag{font:800 8px/1 var(--font-sans);letter-spacing:.09em;text-transform:uppercase}
.node:hover .box{stroke:var(--emphasis);stroke-width:2}
.node.sel .box{stroke:var(--emphasis);stroke-width:2.5;filter:drop-shadow(0 0 6px color-mix(in srgb,var(--emphasis) 55%,transparent))}
.node.dim{opacity:.2;transition:opacity .18s}
.node.hot .box{stroke:var(--emphasis)}
/* inner wrapper carries the appearance animation → never clobbers the node's
   position transform on the OUTER <g> (that was the v1 pile-up bug). */
.node .ni{opacity:1}
@keyframes nodeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.node .ni.animate{animation:nodeIn .36s cubic-bezier(.2,.7,.3,1) both}
/* draw-in on load: dasharray=len (set inline) + offset len→0 traces each edge */
.edge.draw{animation:edgeDraw .6s ease forwards}
@keyframes edgeDraw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:0}}
/* idle: continuous subtle marching flow over the whole graph (no focus needed) */
.edge.idle{animation:edgeIdle 2.4s linear infinite}
@keyframes edgeIdle{to{stroke-dashoffset:-48}}
@keyframes flowPulse{to{stroke-dashoffset:-42}}
.edge.flow{stroke-dasharray:7 11!important;animation:flowPulse .55s linear infinite!important;opacity:1;stroke-width:2.8}

/* toolbar + legend */
.toolbar{position:fixed;left:18px;bottom:18px;z-index:35;display:flex;gap:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:6px;box-shadow:var(--node-shadow)}
.tool{width:32px;height:32px;border-radius:var(--r-md);border:none;background:transparent;color:var(--muted);
  font-size:16px;font-weight:700;cursor:pointer;display:grid;place-items:center}
.tool:hover{background:var(--surface-2);color:var(--fg)}
.legend{position:fixed;right:18px;bottom:18px;z-index:35;display:flex;flex-wrap:wrap;gap:4px 10px;max-width:360px;
  padding:9px 12px;background:color-mix(in srgb,var(--surface) 92%,transparent);
  border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--node-shadow)}
.legend .li{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted)}
.legend .sw{width:9px;height:9px;border-radius:3px}
.legend .ed{width:16px;height:0;border-top-width:2px;border-top-style:solid}

/* panels */
.panel{position:fixed;top:100px;bottom:0;width:384px;max-width:88vw;z-index:38;
  background:var(--surface);border-left:1px solid var(--border);box-shadow:-8px 0 24px rgb(0 0 0/.10);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.7,.3,1);right:0}
.panel.left{left:0;right:auto;border-left:none;border-right:1px solid var(--border);
  transform:translateX(-100%);box-shadow:8px 0 24px rgb(0 0 0/.10)}
.panel.open{transform:none}
.panel .phead{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.panel .phead h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em}
.panel .phead .x{margin-left:auto;width:28px;height:28px;border-radius:var(--r-md);border:none;
  background:var(--surface-2);color:var(--muted);font-size:16px;cursor:pointer}
.panel .pbody{overflow-y:auto;padding:18px;flex:1}
.h2{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px}
.h2:first-child{margin-top:0}
.tierhero{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--r-lg);
  background:linear-gradient(135deg,var(--secondary),transparent);border:1px solid var(--border)}
.tierhero .ring{width:56px;height:56px;flex:none;border-radius:50%;display:grid;place-items:center;
  color:#fff;background:conic-gradient(var(--emphasis) var(--p,82%),var(--rtrack,#e4e4e7) 0)}
html[data-theme="dark"] .tierhero .ring{--rtrack:#232b3a}
.tierhero .ring i{width:42px;height:42px;border-radius:50%;background:var(--surface);display:grid;place-items:center;
  font-style:normal;font-size:16px;font-weight:800;color:var(--emphasis)}
.tierhero .meta .lv{font-size:16px;font-weight:800}
.tierhero .meta .tg{font-size:11.5px;color:var(--faint)}
.ladder{display:flex;flex-direction:column;gap:2px}
.rung{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);font-size:12.5px}
.rung .dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border-strong);flex:none}
.rung.done .dot{background:var(--emphasis);border-color:var(--emphasis)}
.rung.cur{background:var(--secondary);font-weight:700;color:var(--secondary-fg)}
.rung.cur .dot{background:var(--emphasis);border-color:var(--emphasis);box-shadow:0 0 0 3px color-mix(in srgb,var(--emphasis) 25%,transparent)}
.rung .n{color:var(--faint);font-variant-numeric:tabular-nums;width:14px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.tchip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r-full);
  background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
.tchip.is-tool{background:var(--secondary);color:var(--secondary-fg);border-color:transparent}
.callout{font-size:12.5px;line-height:1.5;color:var(--muted);background:var(--surface-2);
  border:1px solid var(--border);border-left:3px solid var(--emphasis);padding:11px 13px;border-radius:var(--r-md)}
.acc{border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;background:var(--surface)}
.acc>summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;gap:10px;user-select:none}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary:hover{background:var(--surface-2)}
.acc .nm{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc .caret{color:var(--faint);transition:transform .2s;font-size:11px}
.acc[open] .caret{transform:rotate(90deg)}
.score{font-size:12px;font-weight:800;padding:2px 9px;border-radius:var(--r-full);color:#fff;font-variant-numeric:tabular-nums}
.score.high{background:var(--ds-success)} .score.mid{background:var(--ds-warning)} .score.low{background:var(--ds-destructive)}
.lvtag{font-size:10px;font-weight:800;letter-spacing:.05em;padding:2px 7px;border-radius:var(--r-sm);background:var(--secondary);color:var(--secondary-fg)}
.acc .abody{padding:0 14px 14px;font-size:12.5px;color:var(--muted);line-height:1.5}
.areas{display:flex;flex-direction:column;gap:6px;margin:6px 0 12px}
.area{display:grid;grid-template-columns:96px 1fr 30px;align-items:center;gap:8px}
.area .an{font-size:11px;color:var(--faint)}
.area .bar{height:6px;border-radius:99px;background:var(--ds-zinc-200)}
html[data-theme="dark"] .area .bar{background:#232b3a}
.area .bar>i{display:block;height:100%;border-radius:99px;background:var(--emphasis)}
.area .av{font-size:10.5px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.evid{margin:0;padding-left:16px} .evid li{margin:3px 0}
.impr{list-style:none;padding:0;margin:6px 0 0}
.impr li{display:flex;gap:8px;padding:5px 0} .impr li::before{content:"→";color:var(--emphasis);font-weight:800}
#detail .dk{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:var(--r-full);color:#fff;display:inline-block;margin-bottom:10px}
#detail .dl{font-size:19px;font-weight:800;letter-spacing:-.01em;margin:0 0 2px}
#detail .ds{font-size:12px;color:var(--faint);font-family:var(--font-mono);margin-bottom:14px}
#detail .dd{font-size:13.5px;line-height:1.55;color:var(--muted)}
#detail .src{margin-top:16px;font-family:var(--font-mono);font-size:11.5px;color:var(--emphasis);
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;word-break:break-all}
#detail .neigh{margin-top:18px}
#detail .nrow{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0;border-top:1px solid var(--border)}
#detail .nrow .ar{color:var(--faint);font-family:var(--font-mono);font-size:10px;width:64px;flex:none}
#detail .nrow b{cursor:pointer;color:var(--fg)} #detail .nrow b:hover{color:var(--emphasis)}
.scrim{position:fixed;inset:100px 0 0 0;background:rgb(0 0 0/.18);z-index:37;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.on{opacity:1;pointer-events:auto}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .node .ni.animate{opacity:1!important;transform:none!important}
  .edge.draw,.edge.idle,.edge.flow{stroke-dashoffset:0!important}
}
@media (max-width:640px){.panel{width:100vw;max-width:100vw}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="powered">Powered by</span>
    <svg class="wordmark" viewBox="0 0 87 18" aria-label="Shakers"><g id="wm"></g></svg>
  </div>
  <div class="proj"><div class="name" id="pName">—</div><div class="tag" id="pTag">—</div></div>
  <div class="spacer"></div>
  <button class="hbtn" id="btnFoot"><span class="dot"></span>Footprint IA</button>
  <button class="hbtn" id="btnCert"><span class="dot"></span>Certificaciones</button>
  <button class="hbtn" id="btnTheme">◐ Tema</button>
</header>

<div class="stats" id="stats"></div>
<div class="degrade-banner" id="degradeBanner" hidden></div>

<div id="stage">
  <svg id="svg"><defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" class="edge-arrow"><path d="M0,0 L10,5 L0,10 z"/></marker>
  </defs><g id="viewport">
    <g id="gBands"></g><g id="gEdges"></g><g id="gLabels"></g><g id="gNodes"></g>
  </g></svg>
</div>

<div class="toolbar">
  <button class="tool" id="zIn" title="Acercar">＋</button>
  <button class="tool" id="zOut" title="Alejar">－</button>
  <button class="tool" id="zFit" title="Encajar todo">⤢</button>
  <button class="tool" id="zReset" title="Reset">⟳</button>
</div>
<div class="legend" id="legend"></div>

<div class="scrim" id="scrim"></div>
<aside class="panel left" id="foot"><div class="phead"><h3>Huella de IA</h3><button class="x" data-close>×</button></div><div class="pbody" id="footBody"></div></aside>
<aside class="panel left" id="cert"><div class="phead"><h3>Certificaciones</h3><button class="x" data-close>×</button></div><div class="pbody" id="certBody"></div></aside>

document.getElementById('wm').innerHTML=WM.map(d=>'<path d="'+d+'"/>').join('');

/* ===== SAMPLE DATA — graph{} exact foglamp contract shape (real detection of
        shakers-hub-backend); footprint/certs = plausible mock ===== */
const DATA=__DATA_INJECT__;

/* ===== node style maps ===== */
/* c=accent colour, tag=kind label, g=per-kind GLYPH (white on the colour chip
   when there's no brand favicon) — near-universal BMP symbols so every node
   shows a meaningful icon even offline / when a favicon fetch fails. */
const KIND={
  entry:{c:"#0e7d69",tag:"entry",g:"▶"}, cron:{c:"#b0bd2d",tag:"cron",g:"↻"}, agent:{c:"#269787",tag:"agent",g:"◆"},
  model:{c:"#8a9a1f",tag:"model",g:"◇"}, tool:{c:"#f59e0b",tag:"tool",g:"⚙"}, service:{c:"#51b1a5",tag:"service",g:"▣"},
  store:{c:"#64748b",tag:"store",g:"▤"}, external:{c:"#b06a86",tag:"external",g:"↗"}
};
const NS="http://www.w3.org/2000/svg";
const NW=212, NH=60;
const byId={}; DATA.graph.nodes.forEach(n=>byId[n.id]=n);
const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const clip=(s,m)=>{s=String(s||'');return s.length>m?s.slice(0,m-1)+'…':s;};

/* ===== LAYOUT via dagre (layered LR, crossing-reduced, non-overlapping) ===== */
const g=new dagre.graphlib.Graph({multigraph:true})
  .setGraph({rankdir:"LR",nodesep:22,edgesep:12,ranksep:96,marginx:60,marginy:50,ranker:"network-simplex"})
  .setDefaultEdgeLabel(()=>({}));
DATA.graph.nodes.forEach(n=>g.setNode(n.id,{width:NW,height:NH}));
DATA.graph.edges.forEach((e,i)=>g.setEdge(e.from,e.to,{},"e"+i));
dagre.layout(g);
// dagre gives node CENTER; convert to top-left. Expose positions for verification.
const pos={};
DATA.graph.nodes.forEach(n=>{const d=g.node(n.id);pos[n.id]={x:d.x-NW/2,y:d.y-NH/2,cx:d.x,cy:d.y};});
const GW=g.graph().width, GH=g.graph().height;
window.__LAYOUT__={pos,NW,NH,GW,GH,nodeCount:Object.keys(pos).length};

/* ===== RENDER ===== */
const gBands=document.getElementById('gBands'),gEdges=document.getElementById('gEdges'),
      gLabels=document.getElementById('gLabels'),gNodes=document.getElementById('gNodes');
const stage=document.getElementById('stage'),vp=document.getElementById('viewport');
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;

/* group bands: bbox per (group × dagre column), so bands stay tight instead of
   one giant box across ranks. Drawn behind everything. */
const colOf=id=>Math.round(pos[id].cx);
const groupBuckets={};
DATA.graph.nodes.forEach(n=>{ if(!n.group)return; const k=n.group+"@@"+colOf(n.id); (groupBuckets[k]=groupBuckets[k]||{group:n.group,ids:[]}).ids.push(n.id); });
Object.values(groupBuckets).forEach(b=>{
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  b.ids.forEach(id=>{const p=pos[id];x0=Math.min(x0,p.x);y0=Math.min(y0,p.y);x1=Math.max(x1,p.x+NW);y1=Math.max(y1,p.y+NH);});
  const pad=12;
  gBands.appendChild(el('rect',{class:'gp-band',x:x0-pad,y:y0-pad-14,width:(x1-x0)+pad*2,height:(y1-y0)+pad*2+14,rx:14}));
  const t=el('text',{class:'gp-label',x:x0-pad+8,y:y0-pad-3});t.textContent=b.group;gBands.appendChild(t);
});

/* edges from dagre routing points (smoothed) */
function pathFromPoints(pts){
  if(pts.length<2)return"";
  let d=`M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length-1;i++){
    const xc=(pts[i].x+pts[i+1].x)/2, yc=(pts[i].y+pts[i+1].y)/2;
    d+=` Q${pts[i].x},${pts[i].y} ${xc},${yc}`;
  }
  const last=pts[pts.length-1]; d+=` L${last.x},${last.y}`;
  return d;
}
const edgeEls=[]; const adj={};
DATA.graph.nodes.forEach(n=>adj[n.id]={out:[],in:[]});
DATA.graph.edges.forEach((e,i)=>{
  const ge=g.edge(e.from,e.to,"e"+i); if(!ge)return;
  const p=el('path',{class:'edge '+(e.kind||'calls'),d:pathFromPoints(ge.points),'marker-end':'url(#ah)'});
  gEdges.appendChild(p);
  const len=p.getTotalLength(); p.style.setProperty('--len',len);
  if(!reduce){
    // draw-in: temporarily override dasharray to the full length so the
    // offset animation actually traces the line; then hand off to the idle
    // marching flow (per-kind dasharray from CSS) so the graph stays alive.
    p.style.strokeDasharray=len; p.style.strokeDashoffset=len;
    p.classList.add('draw'); p.style.animationDelay=(0.2+i*0.005)+'s';
    p.addEventListener('animationend',()=>{
      p.style.strokeDasharray=''; p.style.strokeDashoffset=''; p.style.animationDelay='';
      p.classList.remove('draw'); p.classList.add('idle');
    },{once:true});
  }
  const rec={e,p,t:null}; edgeEls.push(rec);
  adj[e.from].out.push({to:e.to,p,e}); adj[e.to].in.push({from:e.from,p,e});
  if(e.label){
    const mid=ge.points[Math.floor(ge.points.length/2)];
    const t=el('text',{class:'elabel',x:mid.x,y:mid.y-5,'text-anchor':'middle'});t.textContent=e.label;
    gLabels.appendChild(t); rec.t=t;
  }
});

/* nodes — OUTER g carries position (transform attr), INNER g carries the
   appearance animation (so CSS transform never clobbers the position). */
const nodeEls={};
DATA.graph.nodes.forEach((n,i)=>{
  const p=pos[n.id], k=KIND[n.kind]||KIND.service;
  const outer=el('g',{class:'node',transform:`translate(${p.x},${p.y})`,'data-id':n.id});
  const g2=el('g',{class:'ni'+(reduce?'':' animate')}); if(!reduce)g2.style.animationDelay=(i*0.02)+'s';
  g2.appendChild(el('rect',{class:'box',x:0,y:0,width:NW,height:NH,rx:12}));
  g2.appendChild(el('rect',{x:0,y:10,width:4,height:NH-20,rx:2,fill:k.c}));
  if(DATA.favicons&&n.domain&&DATA.favicons[n.domain]){
    g2.appendChild(el('rect',{x:14,y:NH/2-11,width:22,height:22,rx:7,fill:'#fff',stroke:k.c,'stroke-width':1.2}));
    const im=el('image',{x:15,y:NH/2-10,width:20,height:20,href:DATA.favicons[n.domain],preserveAspectRatio:'xMidYMid meet'});im.style.clipPath='inset(0 round 6px)';g2.appendChild(im);
  }else{
    // No brand favicon (non-domain kind, or fetch unavailable/offline): a
    // per-kind GLYPH on the colour chip, so the node still reads as an icon —
    // falls back to an initial only if the kind somehow has no glyph.
    g2.appendChild(el('rect',{x:14,y:NH/2-11,width:22,height:22,rx:7,fill:k.c}));
    const mono=el('text',{class:'mono',x:25,y:NH/2+4,'text-anchor':'middle'});
    mono.textContent=k.g||(n.domain?n.domain[0]:n.label[0]).toUpperCase();
    g2.appendChild(mono);
  }
  // kind tag lives on its OWN top row (never shares a line with the title)
  const kt=el('text',{class:'kindtag',x:NW-12,y:16,'text-anchor':'end',fill:k.c});kt.textContent=k.tag;g2.appendChild(kt);
  const lbl=el('text',{class:'lbl',x:47,y:34});lbl.textContent=clip(n.label,21);g2.appendChild(lbl);
  const sub=el('text',{class:'sub',x:47,y:48});sub.textContent=clip(n.sub||'',30);g2.appendChild(sub);
  outer.appendChild(g2);
  outer.addEventListener('mouseenter',()=>hover(n.id,true));
  outer.addEventListener('mouseleave',()=>hover(n.id,false));
  outer.addEventListener('click',ev=>{ev.stopPropagation();select(n.id);});
  gNodes.appendChild(outer); nodeEls[n.id]=outer;
});

/* ===== interaction ===== */
let selId=null;
function hover(id,on){
  if(selId)return;
  if(on){
    const near=new Set([id]); adj[id].out.forEach(x=>near.add(x.to)); adj[id].in.forEach(x=>near.add(x.from));
    for(const nid in nodeEls)nodeEls[nid].classList.toggle('dim',!near.has(nid));
    edgeEls.forEach(({e,p,t})=>{const hot=e.from===id||e.to===id;p.classList.toggle('hot',hot);p.classList.toggle('dim',!hot);if(t)t.classList.toggle('show',hot);});
  }else clearHi();
}
function clearHi(){for(const nid in nodeEls)nodeEls[nid].classList.remove('dim','hot');edgeEls.forEach(({p,t})=>{p.classList.remove('hot','dim','flow');if(t)t.classList.remove('show');});}
function select(id){
  selId=id;
  for(const nid in nodeEls)nodeEls[nid].classList.remove('sel');
  nodeEls[id].classList.add('sel');
  const reach=new Set([id]),q=[id],flow=new Set();
  while(q.length){const cur=q.shift();adj[cur].out.forEach(x=>{flow.add(x.p);if(!reach.has(x.to)){reach.add(x.to);q.push(x.to);}});}
  for(const nid in nodeEls)nodeEls[nid].classList.toggle('dim',!reach.has(nid));
  nodeEls[id].classList.remove('dim');
  edgeEls.forEach(({p,t})=>{const on=flow.has(p);p.classList.toggle('dim',!on);p.classList.toggle('flow',on&&!reduce);p.classList.toggle('hot',on);if(t)t.classList.toggle('show',on);});
  openDetail(id);
}
function deselect(){selId=null;clearHi();for(const nid in nodeEls)nodeEls[nid].classList.remove('sel');closePanel('detail');}

/* ===== pan / zoom ===== */
let tx=0,ty=0,scale=1;
function apply(){vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
function fit(){
  const r=stage.getBoundingClientRect();
  scale=Math.min(r.width/(GW+40),r.height/(GH+40),1.15)*0.94;
  tx=(r.width-GW*scale)/2; ty=(r.height-GH*scale)/2; apply();
}
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=stage.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12,ns=Math.min(3,Math.max(0.2,scale*f));
  tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;apply();
},{passive:false});
let drag=null;
stage.addEventListener('pointerdown',e=>{
  if(e.target.closest('.node'))return;
  drag={x:e.clientX,y:e.clientY,tx,ty};stage.classList.add('panning');stage.setPointerCapture(e.pointerId);
  if(selId)deselect();
});
stage.addEventListener('pointermove',e=>{if(!drag)return;tx=drag.tx+(e.clientX-drag.x);ty=drag.ty+(e.clientY-drag.y);apply();});
stage.addEventListener('pointerup',()=>{drag=null;stage.classList.remove('panning');});
document.getElementById('zIn').onclick=()=>{scale=Math.min(3,scale*1.2);apply();};
document.getElementById('zOut').onclick=()=>{scale=Math.max(.2,scale/1.2);apply();};
document.getElementById('zFit').onclick=fit;
document.getElementById('zReset').onclick=()=>{deselect();fit();};

/* ===== panels ===== */
const scrim=document.getElementById('scrim');
function openPanel(id){if(id!=='detail')['foot','cert'].forEach(p=>{if(p!==id)closePanel(p);});document.getElementById(id).classList.add('open');if(id!=='detail')scrim.classList.add('on');syncBtns();}
function closePanel(id){document.getElementById(id).classList.remove('open');if(!document.getElementById('foot').classList.contains('open')&&!document.getElementById('cert').classList.contains('open'))scrim.classList.remove('on');syncBtns();}
function syncBtns(){document.getElementById('btnFoot').classList.toggle('on',document.getElementById('foot').classList.contains('open'));document.getElementById('btnCert').classList.toggle('on',document.getElementById('cert').classList.contains('open'));}
document.getElementById('btnFoot').onclick=()=>document.getElementById('foot').classList.contains('open')?closePanel('foot'):openPanel('foot');
document.getElementById('btnCert').onclick=()=>document.getElementById('cert').classList.contains('open')?closePanel('cert'):openPanel('cert');
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{const p=b.closest('.panel');if(p.id==='detail')deselect();else closePanel(p.id);});
scrim.onclick=()=>{closePanel('foot');closePanel('cert');};

function openDetail(id){
  const n=byId[id],k=KIND[n.kind]||KIND.service;
  const outs=adj[id].out.map(x=>`<div class="nrow"><span class="ar">${x.e.kind||'→'}</span><b data-goto="${x.to}">${clip(byId[x.to].label,26)}</b></div>`).join('');
  const ins=adj[id].in.map(x=>`<div class="nrow"><span class="ar">${x.e.kind||'←'}</span><b data-goto="${x.from}">${clip(byId[x.from].label,26)}</b></div>`).join('');
  document.getElementById('detailBody').innerHTML=
    `<span class="dk" style="background:${k.c}">${k.tag}</span>
     <div class="dl">${esc(n.label)}</div>
     ${n.sub?`<div class="ds">${esc(n.sub)}</div>`:''}
     ${n.detail?`<div class="dd">${esc(n.detail)}</div>`:''}
     ${n.sourceRef?`<div class="src">${esc(n.sourceRef)}</div>`:''}
     ${outs?`<div class="neigh"><div class="h2">Sale hacia</div>${outs}</div>`:''}
     ${ins?`<div class="neigh"><div class="h2">Entra desde</div>${ins}</div>`:''}`;
  document.getElementById('detailBody').querySelectorAll('[data-goto]').forEach(b=>b.onclick=()=>{select(b.dataset.goto);centerOn(b.dataset.goto);});
  document.getElementById('detail').classList.add('open');
}
function centerOn(id){const r=stage.getBoundingClientRect(),p=pos[id];tx=r.width/2-(p.x+NW/2)*scale;ty=r.height/2-(p.y+NH/2)*scale;apply();}

     <div class="meta"><div class="lv">${esc(f.tier.name)}</div><div class="tg">${esc(f.tier.label)} · score ${f.score}/100</div></div></div>
   <div class="h2">Escalera de madurez</div>
   <div class="ladder">${f.ladder.map(r=>`<div class="rung ${r.n<f.tier.level?'done':''} ${r.n===f.tier.level?'cur':''}"><span class="dot"></span><span class="n">${r.n}</span>${esc(r.name)}</div>`).join('')}</div>
   <div class="h2">Lectura</div><div class="callout">${esc(f.summary)}</div>
   <div class="h2">Herramientas detectadas</div><div class="chips">${f.tools.map(t=>`<span class="tchip is-tool">${esc(t)}</span>`).join('')}</div>
   <div class="h2">Tecnologías</div><div class="chips">${f.technologies.map(t=>`<span class="tchip">${esc(t)}</span>`).join('')}</div>`;

const c=DATA.certs||null;
const L=(c&&c.labels)||{};
const kH='font-weight:700;color:var(--fg);font-size:11px;margin:10px 0 3px';
const kH2='font-weight:600;color:var(--muted);font-size:10.5px;margin:7px 0 2px';
const tagColor=k=>k==='verified'?'var(--ds-success)':k==='partial'?'var(--ds-warning)':k==='n_a'?'var(--faint)':'var(--ds-destructive)';
function agentCard(a){
  const meta=a.meta?`<div style="font-size:11px;color:var(--faint);margin-bottom:6px">${esc(a.meta)}</div>`:'';
  const ver=(a.verified||[]).map(e=>`<li>${esc(e.name)}${e.evidence?': '+esc(e.evidence):''}</li>`).join('');
  const unv=(a.unverified||[]).map(e=>`<li>${esc(e.name)}${e.tagLabel?' ('+esc(e.tagLabel)+')':''}${e.evidence?': '+esc(e.evidence):''}</li>`).join('');
  const why=(ver||unv)?`<div style="${kH}">${esc(L.why||'Why')}</div>`
    +(ver?`<div style="${kH2}">${esc(L.verified||'Verified')}</div><ul class="evid">${ver}</ul>`:'')
    +(unv?`<div style="${kH2}">${esc(L.unverified||'Unverified')}</div><ul class="evid">${unv}</ul>`:''):'';
  const areas=(a.areas||[]).length?`<div style="${kH}">${esc(L.areas||'Areas')}</div><ul class="evid">`
    +a.areas.map(ar=>`<li><b>${esc(ar.name)}</b> <span style="color:${tagColor(ar.tagKey)};font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em">${esc(ar.tag)}</span>${ar.evidence?': '+esc(ar.evidence):''}</li>`).join('')+`</ul>`:'';
  const rat=a.rationale?`<p style="font-size:12px;color:var(--muted);line-height:1.5;margin:9px 0 0"><b style="color:var(--fg)">${esc(L.rationale||'Assessment')}:</b> ${esc(a.rationale)}</p>`:'';
  return `<details class="acc"><summary><span class="caret">&#9654;</span><span class="nm">${esc(a.name)}</span><span class="score ${a.band||'mid'}">${esc(a.levelName)}</span></summary><div class="abody">${meta}${why}${areas}${rat}</div></details>`;
}
function skillCard(sk){
  const rat=sk.rationale?`<p style="font-size:12.5px;color:var(--muted);line-height:1.5;margin:0 0 6px">${esc(sk.rationale)}</p>`:'';
  const imp=(sk.improvements||[]).length?`<div style="${kH2}">${esc(L.improvements||'Improvements')}</div><ul class="impr">${sk.improvements.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`:'';
  return `<details class="acc"><summary><span class="caret">&#9654;</span><span class="nm">${esc(sk.name)}</span><span class="score ${sk.band||'mid'}">${esc(String(sk.score))}</span></summary><div class="abody">${rat}${imp}</div></details>`;
}
const hasCerts=c&&(((c.agents||[]).length)||((c.skills||[]).length));
document.getElementById('certBody').innerHTML= hasCerts
  ? `${(c.agents||[]).length?`<div class="h2">${esc(L.agentsTitle||'Certified agents')} &middot; ${c.agents.length}</div>${c.agents.map(agentCard).join('')}`:''}`
    +`${(c.skills||[]).length?`<div class="h2">${esc(L.skillsTitle||'Skills')} &middot; ${c.skills.length}</div>${c.skills.map(skillCard).join('')}`:''}`
    +`${c.pnScaleNote?`<div class="callout" style="margin-top:16px;font-size:11.5px">${esc(c.pnScaleNote)}</div>`:''}`
  : `<div class="callout" style="font-size:12.5px">${esc(L.empty||'No certifications for this project yet.')}</div>`;
document.getElementById('legend').innerHTML=
  Object.entries(KIND).map(([k,v])=>`<span class="li"><span class="sw" style="background:${v.c}"></span>${v.tag}</span>`).join('')+
  `<span class="li"><span class="ed" style="border-color:var(--ds-teal-400)"></span>calls</span>
   <span class="li"><span class="ed" style="border-color:var(--ds-lime-600);border-top-style:dashed"></span>triggers</span>
   <span class="li"><span class="ed" style="border-color:#8aa0b4"></span>writes</span>
   <span class="li"><span class="ed" style="border-color:#8aa0b4;border-top-style:dotted"></span>reads</span>`;

document.getElementById('btnTheme').onclick=()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='light'?'dark':'light';};

/* deep-link: #n/<id> selects a node; #foot / #cert open a drawer (also used for headless verification) */
function applyHash(){
  const h=location.hash||'';
  if(h==='#foot'){openPanel('foot');return;}
  if(h==='#cert'){openPanel('cert');return;}
  const m=h.match(/^#n\/(.+)$/);if(m&&byId[m[1]]){select(m[1]);centerOn(m[1]);}
}
window.addEventListener('resize',()=>{if(!drag)fit();});
fit();
applyHash();
window.__READY__=true;
</script>
</body>
</html>
