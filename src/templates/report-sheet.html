<!doctype html>
<html lang="__LANG__" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shakers · Informe de uso de IA</title>
<style>
/* ============================================================
   report-sheet template — the shareable report (`report`/`sheet`) design,
   ported from mockup-report.html. Self-contained: no external CSS/JS/fonts/
   network. Content is injected server-side from LIVE data (src/render-sheet.js).
   ============================================================ */

/* --- Tokens (Shakers DS: teal/lime/zinc) --------------------- */
:root{
  --lime:#d8e637; --lime-soft:#eef3a8;
  --teal-500:#0e7d69; --teal-700:#08473c; --teal-900:#06332b;
  --ink:#181B1A;
  --white:#ffffff;
  --zinc-50:#fafafa; --zinc-100:#f4f4f5; --zinc-200:#e4e4e7; --zinc-300:#d4d4d8;
  --zinc-400:#a1a1aa; --zinc-500:#71717a; --zinc-600:#52525b; --zinc-700:#3f3f46; --zinc-800:#27272a;
  --band-high-fg:#0e7d69; --band-high-bg:#dcfce7;
  --band-mid-fg:#a16207;  --band-mid-bg:#fef9c3;
  --band-low-fg:#b91c1c;  --band-low-bg:#fee2e2;
}
[data-theme="light"]{
  --bg:var(--white); --bg-elev:var(--zinc-50); --card:var(--white);
  --card-2:var(--zinc-50); --border:var(--zinc-200); --border-strong:var(--zinc-300);
  --fg:var(--ink); --fg-muted:var(--zinc-500); --fg-soft:var(--zinc-600);
  --accent:var(--teal-500); --accent-ink:#053b32;
  --track:var(--zinc-200); --chip-bg:var(--zinc-100); --chip-fg:var(--zinc-700);
  --wordmark:var(--ink); --header-bg:rgba(255,255,255,.82);
  --ring-track:var(--zinc-200);
}
[data-theme="dark"]{
  --bg:#0c1210; --bg-elev:#111a17; --card:#111a17;
  --card-2:#0f1613; --border:#1f2d28; --border-strong:#2b3d37;
  --fg:#e7f0ec; --fg-muted:#7d938b; --fg-soft:#a6bab1;
  --accent:var(--lime); --accent-ink:#0c1210;
  --track:#1c2b26; --chip-bg:#16211d; --chip-fg:#bcd0c8;
  --wordmark:#e7f0ec; --header-bg:rgba(12,18,16,.82);
  --ring-track:#1c2b26;
  --band-high-bg:#0d2b1e; --band-high-fg:#4ade80;
  --band-mid-bg:#2d2510;  --band-mid-fg:#facc15;
  --band-low-bg:#2d1414;  --band-low-fg:#f87171;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); color:var(--fg);
  font:15px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .35s ease, color .35s ease;
}
a{color:inherit}
.mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}

/* --- Header -------------------------------------------------- */
header.top{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
  padding:14px clamp(16px,4vw,40px);
  background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex; align-items:center; gap:12px}
.brand .powered{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--fg-muted)}
.brand svg.wordmark{height:19px; width:auto; display:block}
.brand svg.wordmark path{fill:var(--wordmark); transition:fill .35s ease}
.brand .bolt{width:9px;height:9px;border-radius:2px;background:var(--lime);
  box-shadow:0 0 0 0 rgba(216,230,55,.6); animation:pulse 3s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(216,230,55,.5)}70%{box-shadow:0 0 0 8px rgba(216,230,55,0)}100%{box-shadow:0 0 0 0 rgba(216,230,55,0)}}
.head-meta{display:flex; align-items:center; gap:16px}
.head-title{text-align:right}
.head-title .t{font-weight:650; font-size:14px}
.head-title .s{font-size:12px; color:var(--fg-muted)}
.theme-toggle{
  appearance:none; border:1px solid var(--border-strong); background:var(--card);
  color:var(--fg); border-radius:999px; padding:7px 12px; font-size:12px; cursor:pointer;
  display:inline-flex; align-items:center; gap:7px; transition:.2s;
}
.theme-toggle:hover{border-color:var(--accent); transform:translateY(-1px)}

/* the animated accent sweep under the header */
.accent-sweep{height:2px; background:linear-gradient(90deg,transparent,var(--lime),var(--teal-500),transparent);
  background-size:200% 100%; animation:sweep 6s linear infinite}
@keyframes sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* --- Layout -------------------------------------------------- */
.wrap{max-width:1320px; margin:0 auto; padding:clamp(18px,3vw,34px) clamp(16px,4vw,40px) 80px}
.grid{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1.05fr); gap:26px; align-items:start}
@media (max-width:960px){.grid{grid-template-columns:1fr}}
.col-left{position:sticky; top:80px}
@media (max-width:960px){.col-left{position:static}}

.col-head{display:flex; align-items:baseline; gap:10px; margin:2px 0 14px}
.col-head h2{margin:0; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg-muted); font-weight:650}
.col-head .dot{width:6px;height:6px;border-radius:50%; background:var(--accent)}

/* --- Cards --------------------------------------------------- */
.card{
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:18px 18px; margin-bottom:16px;
  box-shadow:0 1px 2px rgba(0,0,0,.03);
  transition:transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s, border-color .3s, background .35s;
}
.card:hover{border-color:var(--border-strong); box-shadow:0 8px 26px rgba(0,0,0,.06)}
.card h3{margin:0 0 4px; font-size:14px; font-weight:650}
.card .sub{color:var(--fg-muted); font-size:12.5px; margin:0 0 12px}

/* reveal-on-load stagger */
.reveal{opacity:0; transform:translateY(14px); transition:opacity .6s ease, transform .6s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1; transform:none}

/* --- Hero score --------------------------------------------- */
.hero{display:flex; gap:20px; align-items:center}
.ring{--p:88; position:relative; width:132px; height:132px; flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .track{fill:none; stroke:var(--ring-track); stroke-width:11}
.ring .fill{fill:none; stroke:var(--accent); stroke-width:11; stroke-linecap:round;
  stroke-dasharray:339.29; stroke-dashoffset:339.29;
  transition:stroke-dashoffset 1.4s cubic-bezier(.16,1,.3,1)}
.ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.ring .num b{font-size:34px; font-weight:750; letter-spacing:-.02em}
.ring .num small{font-size:11px; color:var(--fg-muted)}
.hero-meta{min-width:0}
.tier-chip{display:inline-flex; align-items:center; gap:8px; background:var(--teal-700); color:#eafff7;
  border-radius:999px; padding:6px 13px; font-size:12.5px; font-weight:600}
.tier-chip .k{background:var(--lime); color:var(--ink); border-radius:5px; padding:1px 6px; font-size:11px; font-weight:750}
.hero-meta .band-line{margin-top:10px; font-size:13px; color:var(--fg-soft)}
.hero-meta .band-line b{color:var(--fg)}
.lvl-pills{display:flex; gap:5px; margin-top:12px}
.lvl-pills span{flex:1; height:7px; border-radius:4px; background:var(--track); transition:background .5s}
.lvl-pills span.on{background:linear-gradient(90deg,var(--teal-500),var(--lime))}

/* --- Tier ladder (stepper) ---------------------------------- */
.ladder{list-style:none; margin:6px 0 0; padding:0; position:relative}
.ladder:before{content:""; position:absolute; left:11px; top:6px; bottom:6px; width:2px; background:var(--border); }
.ladder li{position:relative; padding:7px 0 7px 34px; font-size:13px}
.ladder .node{position:absolute; left:3px; top:9px; width:18px; height:18px; border-radius:50%;
  background:var(--card); border:2px solid var(--border-strong); display:grid; place-items:center; font-size:10px}
.ladder li.done .node{background:var(--teal-500); border-color:var(--teal-500); color:#fff}
.ladder li.current .node{background:var(--lime); border-color:var(--lime); color:var(--ink);
  box-shadow:0 0 0 0 rgba(216,230,55,.55); animation:pulse 2.6s infinite}
.ladder li .name{font-weight:600}
.ladder li.pending{color:var(--fg-muted)}
.ladder li .k{font-size:11px; color:var(--fg-muted)}
.ladder li .desc{font-size:12px; color:var(--fg-muted); margin-top:1px}
.ladder li .unlock{font-size:11.5px; color:var(--accent); margin-top:2px}

/* --- chips --------------------------------------------------- */
.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{display:inline-flex; align-items:center; gap:7px; background:var(--chip-bg); color:var(--chip-fg);
  border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:12.5px;
  transition:transform .2s, border-color .2s}
.chip:hover{transform:translateY(-2px); border-color:var(--accent)}
.chip .d{width:7px;height:7px;border-radius:50%; background:var(--accent)}

/* --- Agent tree --------------------------------------------- */
.tree{margin:0; padding:0; list-style:none}
.agent{border:1px solid var(--border); border-radius:12px; padding:11px 13px; margin-bottom:9px; background:var(--card-2);
  transition:border-color .25s, transform .25s}
.agent:hover{border-color:var(--border-strong); transform:translateX(2px)}
.agent.child{margin-left:22px; position:relative}
.agent.child:before{content:""; position:absolute; left:-14px; top:20px; width:12px; height:2px; background:var(--border-strong)}
.agent.child:after{content:""; position:absolute; left:-14px; top:-9px; bottom:20px; width:2px; background:var(--border-strong)}
.agent-row{display:flex; align-items:center; gap:10px}
.agent-row .an{font-weight:600; font-size:13.5px}
.agent-row .model{font-size:11px; color:var(--fg-muted); background:var(--chip-bg); border-radius:5px; padding:1px 7px}
.agent-row .spacer{flex:1}
.score-badge{font-weight:700; font-size:12px; padding:3px 10px; border-radius:999px}
.band-high{background:var(--band-high-bg); color:var(--band-high-fg)}
.band-mid{background:var(--band-mid-bg); color:var(--band-mid-fg)}
.band-low{background:var(--band-low-bg); color:var(--band-low-fg)}
.usage{font-size:11px; color:var(--fg-muted)}
.agent .whatdo{font-size:12px; color:var(--fg-soft); margin:6px 0 0}

/* --- Right column: tabs + accordions ------------------------ */
.tabs{display:inline-flex; background:var(--card-2); border:1px solid var(--border); border-radius:999px; padding:4px; gap:4px; margin-bottom:16px; position:relative}
.tab{appearance:none; border:0; background:transparent; color:var(--fg-soft); cursor:pointer;
  padding:8px 18px; border-radius:999px; font-size:13px; font-weight:600; position:relative; z-index:2; transition:color .25s}
.tab.active{color:var(--accent-ink)}
.tab .cnt{font-size:11px; opacity:.7; margin-left:6px}
.tab-ind{position:absolute; z-index:1; top:4px; bottom:4px; border-radius:999px; background:var(--accent);
  transition:left .3s cubic-bezier(.2,.7,.2,1), width .3s cubic-bezier(.2,.7,.2,1)}
.panel-controls{display:flex; justify-content:flex-end; margin:-6px 0 10px}
.mini-btn{appearance:none; background:transparent; border:0; color:var(--accent); font-size:12px; cursor:pointer}
.mini-btn:hover{text-decoration:underline}

.tabpanel{display:none}
.tabpanel.show{display:block; animation:fadein .4s ease}
@keyframes fadein{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}

/* accordion */
.acc{border:1px solid var(--border); border-radius:14px; margin-bottom:12px; background:var(--card); overflow:hidden;
  transition:border-color .25s, box-shadow .25s}
.acc:hover{border-color:var(--border-strong)}
.acc.open{border-color:var(--accent); box-shadow:0 6px 22px rgba(0,0,0,.05)}
.acc-head{width:100%; text-align:left; appearance:none; border:0; background:transparent; cursor:pointer;
  display:flex; align-items:center; gap:12px; padding:14px 16px; color:var(--fg)}
.acc-head .caret{transition:transform .3s; color:var(--fg-muted); flex:none}
.acc.open .acc-head .caret{transform:rotate(90deg)}
.acc-head .title{font-weight:650; font-size:14px}
.acc-head .meta{font-size:12px; color:var(--fg-muted)}
.acc-head .spacer{flex:1}
.level-chip{font-size:12px; font-weight:700; padding:4px 11px; border-radius:999px; white-space:nowrap}
.lvl-P5{background:var(--band-high-bg); color:var(--band-high-fg)}
.lvl-P4{background:var(--band-high-bg); color:var(--band-high-fg)}
.lvl-P3{background:var(--band-mid-bg); color:var(--band-mid-fg)}
.lvl-P2{background:var(--band-mid-bg); color:var(--band-mid-fg)}
.lvl-P1{background:var(--band-low-bg); color:var(--band-low-fg)}

/* the grid-rows 0fr->1fr trick = smooth height animation, no JS measuring */
.acc-body-wrap{display:grid; grid-template-rows:0fr; transition:grid-template-rows .35s ease}
.acc.open .acc-body-wrap{grid-template-rows:1fr}
.acc-body-inner{overflow:hidden; min-height:0}
.acc-body{padding:2px 16px 16px}
.acc-body .blk{margin-top:12px}
.acc-body .blk h5{margin:0 0 5px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-muted)}
.acc-body p{margin:0; font-size:13px; color:var(--fg-soft)}
.acc-body ul{margin:4px 0 0; padding-left:18px; font-size:13px; color:var(--fg-soft)}
.acc-body ul li{margin:3px 0}

/* areas */
.areas{display:flex; flex-direction:column; gap:6px; margin-top:4px}
.area{display:flex; align-items:center; gap:10px; font-size:13px; padding:6px 10px; border-radius:9px; background:var(--card-2)}
.area .nm{flex:1}
.area .tag{font-size:11px; font-weight:650; padding:2px 9px; border-radius:999px}
.tag-verificado{background:var(--band-high-bg); color:var(--band-high-fg)}
.tag-parcial{background:var(--band-mid-bg); color:var(--band-mid-fg)}
.tag-afirmado{background:var(--band-low-bg); color:var(--band-low-fg)}
.tag-na{background:var(--chip-bg); color:var(--fg-muted)}
.area .icn{width:16px; text-align:center}

/* evidence lists */
.evi{font-size:12.5px; margin:2px 0 0; padding-left:18px}
.evi li{margin:3px 0}
.evi.ok li::marker{content:"✓  "; color:var(--band-high-fg)}
.evi.no li::marker{content:"~  "; color:var(--fg-muted)}

/* remediation prompt block */
.remediation{margin-top:12px; border-top:1px dashed var(--border); padding-top:12px}
.remediation .rhead{display:flex; align-items:center; justify-content:space-between; gap:12px}
.copy-btn{appearance:none; border:1px solid var(--border-strong); background:var(--card); color:var(--fg);
  border-radius:8px; padding:4px 10px; font-size:11.5px; cursor:pointer; transition:.2s}
.copy-btn:hover{border-color:var(--accent); color:var(--accent)}
.remediation pre{white-space:pre-wrap; word-break:break-word; font-size:12px; line-height:1.5;
  background:var(--card-2); border:1px solid var(--border); border-radius:10px; padding:12px; margin:8px 0 0; color:var(--fg-soft)}

footer.foot{text-align:center; padding:30px 20px; color:var(--fg-muted); font-size:12px}
footer.foot .wm{display:inline-flex; align-items:center; gap:8px; margin-top:8px; opacity:.8}
footer.foot svg{height:14px}
footer.foot svg path{fill:var(--wordmark)}

.mock-flag{position:fixed; bottom:14px; left:14px; z-index:50; background:var(--lime); color:var(--ink);
  font-size:11px; font-weight:700; padding:6px 12px; border-radius:999px; box-shadow:0 4px 14px rgba(0,0,0,.15)}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important}
  .reveal{opacity:1; transform:none}
}
</style>
</head>

<script>
(function(){
  "use strict";

  /* ---- Theme toggle (light default; dark = foglamp-style preview) ---- */
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var icon = document.getElementById('themeIcon');
  var label = document.getElementById('themeLabel');
  btn.addEventListener('click', function(){
    var dark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', dark ? 'light' : 'dark');
    icon.textContent = dark ? '🌙' : '☀️';
    label.textContent = dark ? 'Oscuro' : 'Claro';
    // re-run the score ring so it re-animates the accent in the new theme
    paintRing();
  });

  /* ---- Score ring animation (stroke-dashoffset) ---- */
  var SCORE = __SCORE__;
  function paintRing(){
    var fill = document.getElementById('ringFill');
    var circumference = 2 * Math.PI * 54; // r=54
    fill.style.strokeDasharray = circumference;
    fill.style.strokeDashoffset = circumference;
    // next frame -> animate to target
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        fill.style.strokeDashoffset = circumference * (1 - SCORE/100);
      });
    });
  }
  // count-up number
  function countUp(){
    var el = document.getElementById('scoreNum');
    var start = null, dur = 1400;
    function step(ts){
      if(!start) start = ts;
      var t = Math.min((ts-start)/dur, 1);
      var eased = 1 - Math.pow(1-t, 3);
      el.textContent = Math.round(SCORE * eased);
      if(t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  /* ---- Reveal on scroll/load (stagger) ---- */
  var reveals = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          var idx = reveals.indexOf(e.target);
          e.target.style.transitionDelay = (Math.max(0, idx) * 80) + 'ms';
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, {threshold:0.12});
    reveals.forEach(function(r){ io.observe(r); });
  } else {
    reveals.forEach(function(r){ r.classList.add('in'); });
  }

  /* ---- Tabs (with sliding indicator) ---- */
  var tabsBar = document.getElementById('tabs');
  var tabs = Array.prototype.slice.call(tabsBar.querySelectorAll('.tab'));
  var ind = document.getElementById('tabInd');
  var panels = Array.prototype.slice.call(document.querySelectorAll('.tabpanel'));
  function moveInd(tab){
    ind.style.left = tab.offsetLeft + 'px';
    ind.style.width = tab.offsetWidth + 'px';
  }
  function selectTab(tab){
    tabs.forEach(function(t){ t.classList.toggle('active', t===tab); });
    var key = tab.getAttribute('data-tab');
    panels.forEach(function(p){ p.classList.toggle('show', p.getAttribute('data-panel')===key); });
    moveInd(tab);
    syncExpandLabel();
  }
  tabs.forEach(function(t){ t.addEventListener('click', function(){ selectTab(t); }); });

  /* ---- Accordions ---- */
  function accordions(){ return Array.prototype.slice.call(document.querySelectorAll('.acc')); }
  document.addEventListener('click', function(ev){
    var head = ev.target.closest && ev.target.closest('.acc-head');
    if(head){
      var acc = head.parentElement;
      acc.classList.toggle('open');
      syncExpandLabel();
    }
    var copy = ev.target.closest && ev.target.closest('.copy-btn');
    if(copy){
      ev.stopPropagation();
      var id = copy.getAttribute('data-copy');
      var pre = document.getElementById(id);
      if(pre && navigator.clipboard){
        navigator.clipboard.writeText(pre.textContent).then(function(){
          var old = copy.textContent; copy.textContent = 'Copiado ✓';
          setTimeout(function(){ copy.textContent = old; }, 1400);
        }).catch(function(){});
      }
    }
  });

  /* ---- Expand all / collapse all (per visible panel) ---- */
  var expandBtn = document.getElementById('expandAll');
  function visiblePanel(){ return document.querySelector('.tabpanel.show'); }
  function visibleAccs(){
    var p = visiblePanel();
    return p ? Array.prototype.slice.call(p.querySelectorAll('.acc')) : [];
  }
  function syncExpandLabel(){
    var accs = visibleAccs();
    var allOpen = accs.length && accs.every(function(a){ return a.classList.contains('open'); });
    expandBtn.textContent = allOpen ? 'Colapsar todo' : 'Expandir todo';
  }
  expandBtn.addEventListener('click', function(){
    var accs = visibleAccs();
    var allOpen = accs.length && accs.every(function(a){ return a.classList.contains('open'); });
    accs.forEach(function(a){ a.classList.toggle('open', !allOpen); });
    syncExpandLabel();
  });

  /* ---- init ---- */
  window.addEventListener('load', function(){
    paintRing();
    countUp();
    moveInd(document.querySelector('.tab.active'));
    syncExpandLabel();
  });
  window.addEventListener('resize', function(){ moveInd(document.querySelector('.tab.active')); });
})();
</script>
